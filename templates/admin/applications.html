{% extends "base.html" %}

{% block content %}
<h2>Applications</h2>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>Student</th>
            <th>Drive</th>
            <th>Company</th>
            <th>Applied At</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for app in applications %}
        <tr>
            <td>{{ app.student.name }}</td>
            <td>{{ app.drive.job_title }}</td>
            <td>{{ app.drive.company.company_name }}</td>
            <td>{{ app.applied_at }}</td>
            <td>{{ app.status }}</td>
            <td class="d-flex gap-2 align-items-center">
                <a class="btn btn-sm btn-outline-info" href="{{ url_for('admin.application_history', application_id=app.id) }}">
                    History
                </a>
                <form method="POST" action="{{ url_for('admin.set_application_status', application_id=app.id) }}" class="d-flex gap-2">
                    <select name="status" class="form-select form-select-sm" required>
                        <option value="Interview">Interview</option>
                        <option value="Placed">Placed</option>
                        <option value="Rejected">Rejected</option>
                    </select>
                    <input type="number" step="0.01" name="package" class="form-control form-control-sm" placeholder="Package">
                    <button type="submit" class="btn btn-sm btn-primary">Set</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
