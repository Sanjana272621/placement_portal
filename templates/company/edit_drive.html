{% extends "base.html" %}

{% block content %}
<h3 class="mb-3">Edit Placement Drive #{{ drive.id }}</h3>
<form method="post">
  <div class="mb-3">
    <label class="form-label">Job Title</label>
    <input type="text" name="job_title" class="form-control" value="{{ drive.job_title }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Job Description</label>
    <textarea name="job_description" class="form-control" rows="4" required>{{ drive.job_description }}</textarea>
  </div>
  <div class="mb-3">
    <label class="form-label">Eligibility Criteria</label>
    <textarea name="eligibility_criteria" class="form-control" rows="3">{{ drive.eligibility_criteria }}</textarea>
  </div>
  <div class="row">
    <div class="col-md-4">
      <div class="mb-3">
        <label class="form-label">Minimum CGPA</label>
        <input type="number" step="0.01" name="min_cgpa" class="form-control" value="{{ drive.min_cgpa }}" required>
      </div>
    </div>
    <div class="col-md-4">
      <div class="mb-3">
        <label class="form-label">Application Deadline</label>
        <input type="date" name="deadline" class="form-control" value="{{ drive.deadline }}" required>
      </div>
    </div>
  </div>
  <button type="submit" class="btn btn-primary">Save Changes</button>
  <a href="{{ url_for('company.dashboard') }}" class="btn btn-secondary ms-2">Back</a>
</form>
{% endblock %}
