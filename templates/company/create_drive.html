{% extends "base.html" %}

{% block content %}
<h3 class="mb-3">Create Placement Drive</h3>
<form method="post">
  <div class="mb-3">
    <label class="form-label">Job Title</label>
    <input type="text" name="job_title" class="form-control" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Job Description</label>
    <textarea name="job_description" class="form-control" rows="4" required></textarea>
  </div>
  <div class="mb-3">
    <label class="form-label">Eligibility Criteria</label>
    <textarea name="eligibility_criteria" class="form-control" rows="3"></textarea>
  </div>
  <div class="row">
    <div class="col-md-4">
      <div class="mb-3">
        <label class="form-label">Minimum CGPA</label>
        <input type="number" step="0.01" name="min_cgpa" class="form-control" required>
      </div>
    </div>
    <div class="col-md-4">
      <div class="mb-3">
        <label class="form-label">Application Deadline</label>
        <input type="date" name="deadline" class="form-control" required>
      </div>
    </div>
  </div>
  <button type="submit" class="btn btn-primary">Create Drive</button>
  <a href="{{ url_for('company.dashboard') }}" class="btn btn-secondary ms-2">Cancel</a>
</form>
{% endblock %}
