{% extends "base.html" %}

{% block content %}
<h2 class="mb-3">Company Registration</h2>
<form method="POST" class="form-shell">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Company Name</label>
            <input type="text" name="company_name" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Login Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">HR Contact Name</label>
            <input type="text" name="hr_contact_name" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">HR Contact Email</label>
            <input type="email" name="hr_contact_email" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">HR Contact Phone</label>
            <input type="text" name="hr_contact_phone" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Website</label>
            <input type="text" name="website" class="form-control">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Industry</label>
            <input type="text" name="industry" class="form-control">
        </div>
    </div>
    <button type="submit" class="btn btn-success w-100">Register Company</button>
</form>
{% endblock %}
