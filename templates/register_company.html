{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card">
      <div class="card-body">
        <h4 class="card-title mb-3">Company Registration</h4>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Company Name</label>
            <input type="text" name="company_name" class="form-control" required>
          </div>
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label">HR Contact Name</label>
                <input type="text" name="hr_contact_name" class="form-control" required>
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label">HR Contact Email</label>
                <input type="email" name="hr_contact_email" class="form-control" required>
              </div>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Website</label>
            <input type="text" name="website" class="form-control">
          </div>
          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label">Login Email</label>
                <input type="email" name="email" class="form-control" required>
              </div>
            </div>
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
              </div>
            </div>
          </div>
          <button type="submit" class="btn btn-info w-100">Register Company</button>
        </form>
        <p class="mt-2 text-muted small">After registration, your account must be approved by the admin before you can create drives.</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
