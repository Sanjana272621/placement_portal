{% extends "base.html" %}

{% block content %}
<h3 class="mb-3">Edit Profile</h3>
<form method="post" enctype="multipart/form-data">
  <div class="row">
    <div class="col-md-6">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
      </div>
    </div>
    <div class="col-md-6">
      <div class="mb-3">
        <label class="form-label">Roll No</label>
        <input type="text" name="roll_no" class="form-control" value="{{ student.roll_no }}" required>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-4">
      <div class="mb-3">
        <label class="form-label">Phone</label>
        <input type="text" name="phone" class="form-control" value="{{ student.phone }}" required>
      </div>
    </div>
    <div class="col-md-4">
      <div class="mb-3">
        <label class="form-label">Department</label>
        <input type="text" name="department" class="form-control" value="{{ student.department }}" required>
      </div>
    </div>
    <div class="col-md-2">
      <div class="mb-3">
        <label class="form-label">CGPA</label>
        <input type="number" step="0.01" name="cgpa" class="form-control" value="{{ student.cgpa }}" required>
      </div>
    </div>
    <div class="col-md-2">
      <div class="mb-3">
        <label class="form-label">Batch Year</label>
        <input type="number" name="batch_year" class="form-control" value="{{ student.batch_year }}" required>
      </div>
    </div>
  </div>
  <div class="mb-3">
    <label class="form-label">Upload Resume (PDF)</label>
    <input type="file" name="resume" class="form-control">
    {% if student.resume_filename %}
      <div class="form-text">
        Current: <a href="{{ url_for('static', filename='resumes/' ~ student.resume_filename) }}" target="_blank">{{ student.resume_filename }}</a>
      </div>
    {% endif %}
  </div>
  <button type="submit" class="btn btn-primary">Save</button>
  <a href="{{ url_for('student.dashboard') }}" class="btn btn-secondary ms-2">Back</a>
</form>
{% endblock %}
