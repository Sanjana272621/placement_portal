{% extends "base.html" %}

{% block content %}
<h2>Student Profile</h2>

<form method="POST" enctype="multipart/form-data">
    <div class="mb-3">
        <label>Name</label>
        <input type="text" name="name" class="form-control" value="{{ student.name }}" required>
    </div>

    <div class="mb-3">
        <label>Phone</label>
        <input type="text" name="phone" class="form-control" value="{{ student.phone }}" required>
    </div>

    <div class="mb-3">
        <label>Department</label>
        <input type="text" name="department" class="form-control" value="{{ student.department }}" required>
    </div>

    <div class="mb-3">
        <label>CGPA</label>
        <input type="number" step="0.01" name="cgpa" class="form-control" value="{{ student.cgpa }}" required>
    </div>

    <div class="mb-3">
        <label>Batch Year</label>
        <input type="number" name="batch_year" class="form-control" value="{{ student.batch_year }}" required>
    </div>

    <div class="mb-3">
        <label>Upload Resume</label>
        <input type="file" name="resume" class="form-control">
    </div>

    {% if student.resume_filename %}
        <p>
            Current Resume:
            <a href="{{ url_for('static', filename='uploads/resumes/' ~ student.resume_filename) }}" target="_blank">
                View Resume
            </a>
        </p>
    {% endif %}

    <button type="submit" class="btn btn-success">Update Profile</button>
</form>
{% endblock %}
