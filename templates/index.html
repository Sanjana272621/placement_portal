{% extends "base.html" %}

{% block content %}
<div class="row">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">Welcome to the Placement Portal</h5>
        <p>Login as Admin, Company, or Student to continue.</p>
        <a href="{{ url_for('auth.login') }}" class="btn btn-primary">Login</a>
      </div>
    </div>
  </div>
  <div class="col-md-6">
    <div class="card">
      <div class="card-body">
        <h5 class="card-title">New User?</h5>
        <p>Register as a student or company.</p>
        <a href="{{ url_for('auth.register_student') }}" class="btn btn-outline-success me-2">Student Registration</a>
        <a href="{{ url_for('auth.register_company') }}" class="btn btn-outline-info">Company Registration</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
