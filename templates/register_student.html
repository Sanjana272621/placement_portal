{% extends "base.html" %}

{% block content %}
<h2 class="mb-3">Student Registration</h2>
<form method="POST" enctype="multipart/form-data" class="form-shell">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Roll No</label>
            <input type="text" name="roll_no" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Department</label>
            <input type="text" name="department" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">CGPA</label>
            <input type="number" step="0.01" name="cgpa" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Batch Year</label>
            <input type="number" name="batch_year" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Resume</label>
            <input type="file" name="resume" class="form-control">
        </div>
    </div>
    <button type="submit" class="btn btn-success w-100">Register</button>
</form>
{% endblock %}
